services:
  orchestrator:
    build:
      context: ../../
      dockerfile: deploy/docker/Dockerfile.service
    container_name: joki-orchestrator
    restart: unless-stopped
    ports:
      - "${PORT:-8080}:${PORT:-8080}"
    env_file:
      - ../../.env
    environment:
      # Override host Mongo → service name di Docker network
      MONGO_URI: mongodb://mongo-db:27017
      APP_ENV: ${APP_ENV:-production}
      PORT: ${PORT:-8080}
    depends_on:
      mongo-db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:${PORT:-8080}/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
