version: '3'

output: prefixed

dotenv: ['.env']

tasks:
  init:
    desc: Initialize project packages and spin up MongoDB container
    cmds:
      - go mod download
      - cd web && npm install
      - task: mongo

  mongo:
    desc: Start MongoDB container service in background
    cmds:
      - docker compose -f deploy/compose/docker-compose.infra.yml up -d

  mongo:stop:
    desc: Stop MongoDB container service
    cmds:
      - docker compose -f deploy/compose/docker-compose.infra.yml down

  build:orchestrator:
    desc: Build Go Orchestrator service binary
    cmds:
      - go build -o bin/orchestrator ./service/orchestrator/cmd/main.go

  dev:orchestrator:
    desc: Build and execute Go Orchestrator backend server locally
    deps:
      - build:orchestrator
    cmds:
      - ./bin/orchestrator

  dev:web:
    desc: Run React frontend dev server locally
    dir: web
    cmds:
      - npm run dev

  dev:
    desc: Run both Go orchestrator backend and React web frontend in parallel
    deps:
      - dev:orchestrator
      - dev:web

  compose:up:
    desc: Start full stack containers (infra + backend + web Nginx)
    cmds:
      - docker compose -f deploy/compose/docker-compose.yml --env-file .env up -d --build

  compose:down:
    desc: Stop and clean full stack containers
    cmds:
      - docker compose -f deploy/compose/docker-compose.yml --env-file .env down

  clean:
    desc: Stop containers and clean compiled local binaries
    cmds:
      - rm -rf bin/
      - docker compose -f deploy/compose/docker-compose.infra.yml down
      - docker compose -f deploy/compose/docker-compose.yml down

  agents:check:
    desc: Hit every registered agent with the standard orchestrator contract payload
    cmds:
      - go run ./tools/agentcheck

  agents:check:md:
    desc: Same as agents:check but print a Markdown table (for README paste)
    cmds:
      - go run ./tools/agentcheck --markdown
